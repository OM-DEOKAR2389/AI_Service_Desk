{% extends 'dashboard/admin_base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="card shadow-sm border-0">

        <div class="card-header bg-white">

            <h4 class="mb-0">
                Ticket Details
            </h4>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                <!-- Title -->

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Title
                    </label>

                    <input type="text"
                           class="form-control"
                           value="{{ ticket.title }}"
                           readonly>

                </div>

                <!-- Description -->

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Description
                    </label>

                    <textarea class="form-control"
                              rows="5"
                              readonly>{{ ticket.description }}</textarea>

                </div>

                <!-- Category & Priority -->

                <div class="row">

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">
                            Category
                        </label>

                        <input type="text"
                               class="form-control"
                               value="{{ ticket.category }}"
                               readonly>

                    </div>

                    <div class="col-md-6 mb-3">

                        <label class="form-label fw-bold">
                            Priority
                        </label>

                        <input type="text"
                               class="form-control"
                               value="{{ ticket.priority }}"
                               readonly>

                    </div>

                </div>

                <!-- Status -->

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Status
                    </label>

                    <input type="text"
                           class="form-control"
                           value="{{ ticket.status }}"
                           readonly>

                </div>

                <!-- Assigned Engineer -->

                <div class="mb-3">

                    <label class="form-label fw-bold">
                        Assign Engineer
                    </label>

                    <select name="engineer" class="form-select">

                        <option value="">
                            Select Engineer
                        </option>

                        {% for engineer in engineers %}

                        <option value="{{ engineer.id }}"
                            {% if ticket.assigned_engineer and ticket.assigned_engineer.id == engineer.id %}selected{% endif %}>

                            {{ engineer.username }}

                        </option>

                        {% endfor %}

                    </select>

                </div>

                <!-- Resolution -->

                <div class="mb-4">

                    <label class="form-label fw-bold">
                        Resolution
                    </label>

                    <textarea class="form-control"
                              rows="5"
                              readonly>{{ ticket.resolution }}</textarea>

                </div>

                <!-- Buttons -->

                <button type="submit" class="btn btn-success">

                    <i class="bi bi-person-check-fill"></i>

                    Assign Engineer

                </button>

                <a href="{% url 'all_tickets' %}"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
