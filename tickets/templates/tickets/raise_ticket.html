{% extends 'dashboard/user_base.html' %}

{% block content %}

<div class="container-fluid">

    <!-- Page Heading -->
    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>
            <h2 class="fw-bold mb-1">
                Raise New Ticket
            </h2>
            <p class="text-muted mb-0">
                Submit your issue and our support team will assist you.
            </p>
        </div>

        <a href="{% url 'user_dashboard' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
            Back
        </a>

    </div>

    <!-- Form Card -->
    <div class="card shadow-sm border-0">

        <div class="card-body p-4">

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Ticket Title
                    </label>

                    {{ form.title }}

                </div>

                <div class="mb-3">

                    <label class="form-label fw-semibold">
                        Description
                    </label>

                    {{ form.description }}

                </div>

                <div class="mb-4">

                    <label class="form-label fw-semibold">
                        Category
                    </label>

                    {{ form.category }}

                </div>

                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-primary">

                        <i class="bi bi-send-fill"></i>
                        Submit Ticket

                    </button>

                    <a href="{% url 'user_dashboard' %}" class="btn btn-secondary">

                        Cancel

                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
